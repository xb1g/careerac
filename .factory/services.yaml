commands:
  install: pnpm install
  dev: pnpm dev
  build: pnpm build
  test: pnpm vitest run
  typecheck: pnpm tsc --noEmit
  lint: pnpm next lint

services:
  web:
    start: PORT=3000 pnpm dev
    stop: lsof -ti :3000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000 || exit 1
    port: 3000
    depends_on: []
